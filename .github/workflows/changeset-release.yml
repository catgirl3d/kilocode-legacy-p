name: Changeset Release

on:
    push:
        branches:
            - main
    workflow_dispatch:

env:
    REPO_PATH: ${{ github.repository }}
    # For normal pushes we only run on main; for manual workflow_dispatch runs use the
    # selected ref so the workflow can be tested safely on a branch.
    GIT_REF: ${{ github.event_name == 'workflow_dispatch' && github.ref_name || 'main' }}
    NODE_VERSION: 20.20.0
    PNPM_VERSION: 10.8.1

jobs:
    # Job 1: Create version bump PR when changesets are merged to main
    changeset-pr-version-bump:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - name: Git Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  ref: ${{ env.GIT_REF }}

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "pnpm"

            - name: Install Dependencies
              run: pnpm install

            # Create version bump PR using changesets/action
            - name: Changeset Pull Request
              id: changesets
              uses: changesets/action@v1
              with:
                  commit: "changeset version bump"
                  title: "Changeset version bump"
                  # Patch the repo after changesets/action checks out/resets its working branch,
                  # otherwise the action's internal git reset discards any earlier config rewrite.
                  version: >-
                      node scripts/patch-changeset-config.cjs && pnpm changeset:version
              env:
                  GITHUB_REPOSITORY: ${{ github.repository }}
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
