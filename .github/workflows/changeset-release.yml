name: Changeset Release

on:
    push:
        branches:
            - main
    workflow_dispatch:

env:
    REPO_PATH: ${{ github.repository }}
    GIT_REF: main
    NODE_VERSION: 20.20.0
    PNPM_VERSION: 10.8.1

jobs:
    # Job 1: Create version bump PR when changesets are merged to main
    changeset-pr-version-bump:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - name: Git Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  ref: ${{ env.GIT_REF }}

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "pnpm"

            - name: Install Dependencies
              run: pnpm install

            # Create version bump PR using changesets/action
            - name: Changeset Pull Request
              id: changesets
              uses: changesets/action@v1
              with:
                  commit: "changeset version bump"
                  title: "Changeset version bump"
                  # Use CHANGESETS_GITHUB_TOKEN only for changelog enrichment during versioning.
                  # Keep the default Actions token for branch push + PR creation, so PAT scope
                  # mismatches do not break the PR API call.
                  # Patch the repo after changesets/action checks out/resets its working branch,
                  # otherwise the action's internal git reset discards any earlier config rewrite.
                  # Restore the committed config afterwards so the temporary fork-specific patch
                  # is not treated as a real change to commit.
                  version: >-
                      node scripts/patch-changeset-config.cjs && pnpm changeset:version && git checkout -- .changeset/config.json
              env:
                  GITHUB_REPOSITORY: ${{ github.repository }}
                  GITHUB_TOKEN: ${{ secrets.CHANGESETS_GITHUB_TOKEN }}
