name: Changeset Release

on:
    push:
        branches:
            - main
    workflow_dispatch:

env:
    REPO_PATH: ${{ github.repository }}
    GIT_REF: main
    NODE_VERSION: 20.20.0
    PNPM_VERSION: 10.8.1

jobs:
    # Job 1: Create version bump PR when changesets are merged to main
    changeset-pr-version-bump:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - name: Git Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  ref: ${{ env.GIT_REF }}

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "pnpm"

            - name: Install Dependencies
              run: pnpm install

            # Create version bump PR using changesets/action
            - name: Changeset Pull Request
              id: changesets
              uses: changesets/action@v1
              with:
                  commit: "changeset version bump"
                  title: "Changeset version bump"
                  # Keep github.token for changesets/action API calls (push branch + create PR).
                  # Use CHANGESETS_GITHUB_TOKEN only inside versioning for changelog GitHub lookups.
                  version: >-
                      node -e const{execFileSync}=require('child_process');const t=process.env.CHANGESETS_GITHUB_TOKEN;if(!t)throw new Error('CHANGESETS_GITHUB_TOKEN_not_set');const e={...process.env,GITHUB_TOKEN:t};execFileSync('node',['scripts/patch-changeset-config.cjs'],{stdio:'inherit',env:e});try{execFileSync('pnpm',['changeset:version'],{stdio:'inherit',env:e});}finally{execFileSync('git',['checkout','--','.changeset/config.json'],{stdio:'inherit'});}
              env:
                  GITHUB_REPOSITORY: ${{ github.repository }}
                  GITHUB_TOKEN: ${{ github.token }}
                  CHANGESETS_GITHUB_TOKEN: ${{ secrets.CHANGESETS_GITHUB_TOKEN }}
